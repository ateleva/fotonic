name: Deploy to WordPress.org

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  deploy:
    name: Deploy to WP.org SVN
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node 22
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: src/package-lock.json

      - name: Build React app
        working-directory: src
        run: |
          npm ci
          npm run build

      - name: Verify build output
        run: |
          test -f dist/fotonic-app.js  || (echo "Build failed: dist/fotonic-app.js missing" && exit 1)
          test -f dist/fotonic-app.css || (echo "Build failed: dist/fotonic-app.css missing" && exit 1)

      - name: Deploy to WordPress.org
        uses: 10up/action-wordpress-plugin-deploy@54bd289b8525fd23a5c365ec369185f2966529c2 # v2.3.0
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: fotonic
          BUILD_DIR: .
